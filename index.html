<script>
  var userAgent = navigator.userAgent || navigator.vendor || window.opera;
  if (/android/i.test(userAgent)) {
    window.location.replace("https://play.google.com/store/apps/details?id=com.reality.reality&hl=en");
  } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
    window.location.replace("https://apps.apple.com/us/app/reality-sports/id6743450293");
  } else {
    window.location.replace("https://www.realitysport.net"); // Fallback for Desktop
  }
</script>
